[package]
name = "llvm-lstm"
version = "0.1.0"
edition = "2024"

[features]
# Enable all passes present in opt's -O3 pipeline for reproducibility testing.
# When enabled, the action space expands from 33 to 73 (32 base transforms + 39 extended + Stop).
full_o3_passes = []

[dependencies]
burn = { version = "0.20.1", features = ["ndarray"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
rand = "0.8"
rayon = "1"
statrs = "0.18"
toml = "0.8"
anyhow = "1"
